<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>蓝牙开锁</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1b2a;
      --card:    #152238;
      --border:  #1e3a5f;
      --accent:  #3b82f6;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --success: #22c55e;
      --warn:    #f59e0b;
      --error:   #ef4444;
      --tab-h:   56px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      min-height: 100dvh;
      padding-bottom: var(--tab-h);
      overflow-x: hidden;
    }

    /* ── Tab bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--tab-h);
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; background: none; border: none; color: var(--muted); cursor: pointer;
      -webkit-tap-highlight-color: transparent; font-family: inherit; padding: 4px 0;
      transition: color .15s;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-icon { font-size: 1.25rem; line-height: 1; }
    .tab-label { font-size: .6rem; font-weight: 600; letter-spacing: .03em; }

    /* ── Pages ── */
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 24px;
      min-height: calc(100dvh - var(--tab-h));
    }
    .page.active { display: flex; }

    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: .04em; color: var(--text); margin-bottom: 3px; }
    .subtitle { font-size: .76rem; color: var(--muted); margin-bottom: 18px; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: .68rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .card-header .card-title { margin-bottom: 0; }

    /* ── Form fields ── */
    .field { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: .75rem; color: var(--muted); width: 80px; flex-shrink: 0; }
    .field input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 7px 10px; color: var(--text); font-size: .78rem; font-family: monospace;
      outline: none; transition: border-color .15s; -webkit-appearance: none; appearance: none;
    }
    .field input:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .refresh-cfg-btn {
      display: block; width: 100%; margin-top: 12px;
      background: var(--accent); border: none; border-radius: 8px; color: #fff;
      font-size: .82rem; font-weight: 600; padding: 10px 0; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: opacity .15s;
      letter-spacing: .03em;
    }
    .refresh-cfg-btn:active { opacity: .75; }
    .refresh-cfg-btn:disabled { opacity: .5; }

    .icon-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 4px 6px; border-radius: 6px;
      -webkit-tap-highlight-color: transparent; transition: color .15s;
    }
    .icon-btn:hover, .icon-btn:active { color: var(--text); }

    .link-btn {
      background: none; border: none; color: var(--accent); cursor: pointer;
      font-size: .75rem; padding: 2px 6px; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary {
      display: block; width: 100%; margin-top: 14px;
      background: var(--accent); border: none; border-radius: 10px;
      color: #fff; font-size: .9rem; font-weight: 600; padding: 12px 0;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity .15s;
    }
    .btn-primary:active { opacity: .8; }

    /* ── 关锁延迟卡片 ── */
    .delay-card-inner {
      display: flex; align-items: center; justify-content: space-between;
    }
    .delay-card-inner .delay-label { font-size: .82rem; color: var(--text); font-weight: 500; }
    .delay-card-inner .delay-hint  { font-size: .68rem; color: var(--muted); margin-top: 2px; }
    .delay-stepper {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .stepper-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-size: 1.2rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: border-color .15s, color .15s; flex-shrink: 0;
      user-select: none;
    }
    .stepper-btn:active { border-color: var(--accent); color: var(--accent); }
    .delay-display {
      font-size: 1.5rem; font-weight: 700; color: var(--accent);
      min-width: 52px; text-align: center; line-height: 1;
    }
    .delay-display-unit { font-size: .75rem; color: var(--muted); font-weight: 400; }
    /* 隐藏原生 number input，保留用于持久化 */
    #cfg-delay { display: none; }

    /* ── Lock button ── */
    .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 14px; }

    .scan-all-btn {
      background: none; border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted); font-size: .75rem; padding: 6px 16px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: color .15s, border-color .15s;
    }
    .scan-all-btn:hover, .scan-all-btn:active { color: var(--text); border-color: var(--accent); }

    #lockBtn {
      width: 150px; height: 150px; border-radius: 50%; background: var(--card);
      border: 3px solid var(--accent); color: var(--accent); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; outline: none; -webkit-tap-highlight-color: transparent;
      transition: transform .1s, box-shadow .3s, border-color .3s, color .3s;
      box-shadow: 0 0 24px rgba(59,130,246,.25); user-select: none;
    }
    #lockBtn:active  { transform: scale(.94); }
    #lockBtn.busy    { border-color: var(--warn);    color: var(--warn);    box-shadow: 0 0 24px rgba(245,158,11,.3); animation: pulse 1.5s ease-in-out infinite; }
    #lockBtn.success { border-color: var(--success); color: var(--success); box-shadow: 0 0 36px rgba(34,197,94,.35); }
    #lockBtn.closed  { border-color: var(--accent);  color: var(--accent);  box-shadow: 0 0 24px rgba(59,130,246,.25); }
    #lockBtn.error   { border-color: var(--error);   color: var(--error);   box-shadow: 0 0 24px rgba(239,68,68,.25); }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 18px rgba(245,158,11,.25); }
      50%      { box-shadow: 0 0 44px rgba(245,158,11,.55); }
    }
    .btn-icon { font-size: 2.6rem; line-height: 1; transition: transform .3s; }
    #lockBtn.success .btn-icon { transform: scale(1.15); }
    .btn-label { font-size: .85rem; font-weight: 600; letter-spacing: .05em; }

    /* ── Info panel ── */
    .info-content { display: flex; flex-direction: column; gap: 7px; }
    .info-row { display: flex; align-items: baseline; gap: 8px; }
    .info-key { font-size: .71rem; color: var(--muted); min-width: 68px; flex-shrink: 0; }
    .info-val { font-size: .82rem; color: var(--text); word-break: break-all; }
    .info-empty { font-size: .78rem; color: var(--muted); text-align: center; padding: 8px 0; width: 100%; }

    /* ── Active key card ── */
    .active-key-name { font-size: .88rem; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .active-key-sub  { font-size: .72rem; color: var(--muted); font-family: monospace; }

    /* ── Keys page ── */
    .keys-actions {
      display: flex; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 14px;
    }
    .action-btn {
      flex: 1; background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: .76rem; padding: 8px 4px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    .action-btn:hover, .action-btn:active { color: var(--text); border-color: var(--accent); }
    .action-btn.accent { border-color: var(--accent); color: var(--accent); font-weight: 600; }

    .keys-list { width: 100%; max-width: 400px; }
    .key-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 13px; margin-bottom: 10px; cursor: pointer;
      transition: border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .key-card.active-key { border-color: var(--accent); }
    .key-card-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .key-card-info { flex: 1; min-width: 0; }
    .key-card-label { font-size: .86rem; font-weight: 600; color: var(--text); margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .key-card-btid  { font-size: .7rem; color: var(--muted); font-family: monospace; }
    .key-card-meta  { font-size: .68rem; color: var(--muted); margin-top: 6px; }
    .key-card-actions { display: flex; gap: 2px; flex-shrink: 0; margin-left: 6px; }
    .key-action-btn {
      background: none; border: none; color: var(--muted); font-size: .88rem;
      padding: 4px 6px; cursor: pointer; border-radius: 6px;
      -webkit-tap-highlight-color: transparent; transition: color .15s;
    }
    .key-action-btn:active { color: var(--text); }
    .key-action-btn.del:active { color: var(--error); }
    .active-badge {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: .58rem; font-weight: 700; padding: 2px 6px; border-radius: 10px;
      margin-left: 6px; vertical-align: middle; letter-spacing: .04em;
    }
    .empty-state {
      text-align: center; color: var(--muted); font-size: .82rem;
      padding: 40px 0; line-height: 1.8;
    }

    /* ── Log card ── */
    .log-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; width: 100%; max-width: 400px;
    }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .log-title { font-size: .7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .log-clear { font-size: .68rem; color: var(--muted); background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    .log-clear:hover { color: var(--text); }
    #logList { list-style: none; max-height: 420px; overflow-y: auto; }
    #logList li { font-size: .74rem; font-family: monospace; padding: 3px 2px; border-bottom: 1px solid rgba(30,58,95,.6); color: var(--muted); word-break: break-all; }
    #logList li:last-child { border-bottom: none; }
    #logList li.info    { color: #93c5fd; }
    #logList li.success { color: var(--success); }
    #logList li.warn    { color: var(--warn); }
    #logList li.error   { color: var(--error); }

    /* ── Modals ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px 16px 0 0; width: 100%; max-width: 480px;
      max-height: 82vh; overflow-y: auto; padding: 20px 16px 36px;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .modal-title { font-size: 1rem; font-weight: 700; color: var(--text); }

    /* ── Checkbox list ── */
    .checkbox-list { display: flex; flex-direction: column; gap: 2px; }
    .checkbox-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 8px; border-radius: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: background .1s;
    }
    .checkbox-item:active { background: rgba(59,130,246,.1); }
    .checkbox-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
    .checkbox-item .field-label { font-size: .84rem; color: var(--text); }
    .checkbox-item .field-key   { font-size: .7rem; color: var(--muted); font-family: monospace; margin-left: auto; }

    /* ── 文件操作按钮 ── */
    .btn-file-action {
      display: block; width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: .9rem; font-weight: 600; padding: 12px 0;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: border-color .15s, color .15s; font-family: inherit;
    }
    .btn-file-action:active { border-color: var(--accent); color: var(--accent); }

    /* ── 模态框分隔线 ── */
    .modal-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0; color: var(--muted); font-size: .72rem;
    }
    .modal-divider::before, .modal-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Export textarea ── */
    .export-ta {
      width: 100%; height: 200px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; color: var(--text); font-family: monospace;
      font-size: .72rem; resize: none; outline: none; margin-top: 8px;
    }
    .hint { font-size: .75rem; color: var(--muted); margin-bottom: 4px; }

    /* ── Notice ── */
    .notice {
      font-size: .75rem; color: var(--warn); background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.25); border-radius: 10px; padding: 10px 14px;
      width: calc(100% - 32px); max-width: 400px; margin: 10px 16px; line-height: 1.5; display: none;
    }
    .notice.show { display: block; }
  </style>
</head>
<body>

  <!-- ── Tab bar ── -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="home" onclick="switchTab('home')">
      <span class="tab-icon">🔒</span>
      <span class="tab-label">主页</span>
    </button>
    <button class="tab-btn" data-tab="config" onclick="switchTab('config')">
      <span class="tab-icon">⚙</span>
      <span class="tab-label">配置</span>
    </button>
    <button class="tab-btn" data-tab="keys" onclick="switchTab('keys')">
      <span class="tab-icon">🗝️</span>
      <span class="tab-label">钥匙</span>
    </button>
    <button class="tab-btn" data-tab="dev" onclick="switchTab('dev')">
      <span class="tab-icon">⌨</span>
      <span class="tab-label">开发者</span>
    </button>
  </nav>

  <!-- ══════════════════════════════════════════════
       Page: 主页
  ══════════════════════════════════════════════ -->
  <div id="page-home" class="page active">
    <h1>蓝牙开锁</h1>
    <p class="subtitle">Web Bluetooth · BLE 智能锁</p>

    <!-- Info panel -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">信息面板</span>
        <button class="icon-btn" onclick="openFieldSelector()" title="设置显示字段">⚙</button>
      </div>
      <div id="infoPanelContent" class="info-content">
        <span class="info-empty">暂无信息，请先在配置页刷新</span>
      </div>
    </div>

    <!-- Active key card -->
    <div class="card" id="activeKeyCard" style="display:none">
      <div class="card-header">
        <span class="card-title">当前钥匙</span>
        <button class="link-btn" onclick="switchTab('keys')">钥匙库 →</button>
      </div>
      <div class="active-key-name" id="activeKeyName"></div>
      <div class="active-key-sub"  id="activeKeySub"></div>
    </div>

    <!-- 关锁延迟卡片 -->
    <div class="card" style="margin-bottom:14px">
      <div class="delay-card-inner">
        <div>
          <div class="delay-label">关锁延迟</div>
          <div class="delay-hint">开锁成功后自动关锁等待时间</div>
        </div>
        <div class="delay-stepper">
          <button class="stepper-btn" onclick="stepDelay(-1)">−</button>
          <div class="delay-display">
            <span id="delayDisplay">5</span><br>
            <span class="delay-display-unit">秒</span>
          </div>
          <button class="stepper-btn" onclick="stepDelay(1)">＋</button>
        </div>
      </div>
      <input type="number" id="cfg-delay" value="5" min="1" max="300" autocomplete="off">
    </div>

    <!-- Lock button -->
    <div class="btn-wrap">
      <button id="lockBtn" onclick="handleClick(false)">
        <span class="btn-icon" id="btnIcon">&#x1F512;</span>
        <span class="btn-label" id="btnLabel">开  锁</span>
      </button>
      <button class="scan-all-btn" onclick="handleClick(true)">找不到设备？扫描全部</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       Page: 配置
  ══════════════════════════════════════════════ -->
  <div id="page-config" class="page">
    <h1>锁配置</h1>
    <p class="subtitle">点击“刷新配置”拉取账号对应的钥匙</p>

    <div class="card">
      <div class="card-title">账号</div>
      <div class="field">
        <label>账号</label>
        <input type="text" id="cfg-login" value="" autocomplete="off">
      </div>
      <div class="field">
        <label>Cookies</label>
        <input type="text" id="cfg-cookies" value="9B308BAAB362EDEB4DFE42EE2006829B" autocomplete="off" spellcheck="false">
      </div>
      <button class="refresh-cfg-btn" onclick="refreshConfig()">&#x21BB;  刷新配置</button>
    </div>

    <div class="card">
      <div class="card-title">钥匙参数</div>
      <div class="field">
        <label>蓝牙ID</label>
        <input type="text" id="cfg-btid" value="" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label>Key ID</label>
        <input type="text" id="cfg-keyid" value="" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label>到期时间</label>
        <input type="text" id="cfg-expire" value="" autocomplete="off">
      </div>
      <div class="field">
        <label>创建时间</label>
        <input type="text" id="cfg-create" value="" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       Page: 钥匙库
  ══════════════════════════════════════════════ -->
  <div id="page-keys" class="page">
    <h1>钥匙库</h1>
    <p class="subtitle">管理已保存的钥匙配置</p>

    <div class="keys-actions">
      <button class="action-btn" onclick="importKeys()">📥 导入</button>
      <button class="action-btn" onclick="exportKeys()">📤 导出</button>
    </div>

    <div id="keysList" class="keys-list">
      <div class="empty-state">暂无保存的钥匙<br>刷新配置可自动保存新钥匙</div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       Page: 开发者
  ══════════════════════════════════════════════ -->
  <div id="page-dev" class="page">
    <h1>开发者</h1>
    <p class="subtitle">调试日志</p>
    <div class="log-card">
      <div class="log-header">
        <span class="log-title">操作日志</span>
        <button class="log-clear" onclick="clearLog()">清除</button>
      </div>
      <ul id="logList"><li>等待操作...</li></ul>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       Modal: 信息字段选择器
  ══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="fieldSelectorModal" onclick="closeFieldSelector()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">选择信息面板字段</span>
        <button class="icon-btn" onclick="closeFieldSelector()">✕</button>
      </div>
      <div id="fieldCheckboxList" class="checkbox-list"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       Modal: 钥匙编辑器
  ══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="keyEditorModal" onclick="closeKeyEditor()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="keyEditorTitle">钥匙详情</span>
        <button class="icon-btn" onclick="closeKeyEditor()">✕</button>
      </div>
      <div class="field"><label>备注名</label><input type="text" id="edit-label" placeholder="自定义名称" autocomplete="off"></div>
      <div class="field"><label>蓝牙ID</label><input type="text" id="edit-btid" autocomplete="off" spellcheck="false"></div>
      <div class="field"><label>Key ID</label><input type="text" id="edit-keyid" autocomplete="off" spellcheck="false" style="font-size:.68rem"></div>
      <div class="field"><label>到期时间</label><input type="text" id="edit-expire" autocomplete="off"></div>
      <div class="field"><label>创建时间</label><input type="text" id="edit-create" autocomplete="off"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  配置持久化（localStorage）
// ═══════════════════════════════════════════════════════════════════
const CFG_KEY = 'ble_lock_cfg';
const CFG_FIELDS = ['cfg-login','cfg-cookies','cfg-btid','cfg-keyid','cfg-expire','cfg-create','cfg-delay'];

function saveConfig() {
  const data = {};
  for (const id of CFG_FIELDS) {
    const el = document.getElementById(id);
    if (el) data[id] = el.value;
  }
  try { localStorage.setItem(CFG_KEY, JSON.stringify(data)); } catch(_) {}
}

function loadConfig() {
  let data;
  try { data = JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); } catch(_) {}
  if (!data) return;
  for (const id of CFG_FIELDS) {
    const el = document.getElementById(id);
    if (el && data[id] !== undefined) el.value = data[id];
  }
}

// ═══════════════════════════════════════════════════════════════════
//  Android 原生桥（WebView 环境下 window.AndroidBridge 由 Kotlin 注入）
// ═══════════════════════════════════════════════════════════════════
const NATIVE = typeof window.AndroidBridge !== 'undefined';

window.JSBridge = (() => {
  const pending = new Map();
  let seq = 0, notifyFn = null;
  return {
    _reg(resolve, reject) {
      const id = 'c' + (++seq);
      pending.set(id, { resolve, reject });
      return id;
    },
    onHttpResult(id, code, body) {
      const p = pending.get(id); if (!p) return; pending.delete(id);
      (code >= 200 && code < 300) ? p.resolve({ code, body }) : p.reject(new Error(`HTTP ${code}`));
    },
    onBleResult(id, st, data) {
      const p = pending.get(id); if (!p) return; pending.delete(id);
      st === 'ok' ? p.resolve(data) : p.reject(new Error(data));
    },
    onBleNotify(hex) { notifyFn?.(hex); },
    setNotifyHandler(fn) { notifyFn = fn; },
  };
})();

function nativeCall(fn) {
  return new Promise((res, rej) => fn(window.JSBridge._reg(res, rej)));
}

async function apiPost(url, headers, bodyObj) {
  if (NATIVE) {
    const r = await nativeCall(id =>
      window.AndroidBridge.httpPost(url, JSON.stringify(headers), JSON.stringify(bodyObj), id)
    );
    return JSON.parse(r.body);
  }
  const resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(bodyObj) });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// ═══════════════════════════════════════════════════════════════════
//  环境检测
// ═══════════════════════════════════════════════════════════════════
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
if (isIOS && !('bluetooth' in navigator)) {
  showNotice('iOS Safari 不支持 Web Bluetooth API，请使用 Bluefy 或 WebBLE 浏览器打开本页面。');
}
if (!NATIVE && location.protocol === 'file:') {
  showNotice('Web Bluetooth 需要 HTTPS 环境（或 localhost）。请将此页面部署到 HTTPS 服务器后再使用。');
}

// ═══════════════════════════════════════════════════════════════════
//  日志
// ═══════════════════════════════════════════════════════════════════
function log(msg, type = 'info') {
  const ul = document.getElementById('logList');
  if (ul.children.length === 1 && ul.children[0].className === '') ul.innerHTML = '';
  const li = document.createElement('li');
  li.className = type;

  ul.prepend(li);
  while (ul.children.length > 60) ul.removeChild(ul.lastChild);
}
function clearLog() { document.getElementById('logList').innerHTML = '<li>等待操作...</li>'; }
function showNotice(msg) {
  const el = document.getElementById('notice');
  el.textContent = msg; el.classList.add('show');
}

// ═══════════════════════════════════════════════════════════════════
//  按钮状态
// ═══════════════════════════════════════════════════════════════════
let busy = false;

function setBtnState(state) {
  const btn   = document.getElementById('lockBtn');
  const icon  = document.getElementById('btnIcon');
  const label = document.getElementById('btnLabel');
  btn.className = state === 'idle' ? '' : state;
  if (state === 'idle')    { icon.innerHTML = '&#x1F512;'; label.textContent = '开  锁'; }
  if (state === 'busy')    { icon.innerHTML = '&#x1F4E1;'; label.textContent = '连接中…'; }
  if (state === 'success') { icon.innerHTML = '&#x1F513;'; label.textContent = '已开锁'; }
  if (state === 'closed')  { icon.innerHTML = '&#x1F512;'; label.textContent = '已关锁'; setTimeout(() => setBtnState('idle'), 3000); }
  if (state === 'error')   { icon.innerHTML = '&#x26A0;';  label.textContent = '失  败'; setTimeout(() => setBtnState('idle'), 3000); }
}

// ═══════════════════════════════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════════════════════════════
const delay = ms => new Promise(r => setTimeout(r, ms));
function pad2(n) { return String(n).padStart(2, '0'); }
function pad3(n) { return String(n).padStart(3, '0'); }
function hexToBytes(hex) {
  const b = new Uint8Array(hex.length >> 1);
  for (let i = 0; i < b.length; i++) b[i] = parseInt(hex.slice(i*2, i*2+2), 16);
  return b;
}
function bytesToHex(buf) {
  return Array.from(buf).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════════════════════════════════════
//  MD5（返回 16 字节 Uint8Array）
// ═══════════════════════════════════════════════════════════════════
function md5(input) {
  const S = [7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
  const T = [];
  for (let i = 0; i < 64; i++) T[i] = (Math.abs(Math.sin(i+1)) * 0x100000000) >>> 0;
  const len = input.length;
  let padLen = 56 - (len % 64);
  if (padLen <= 0) padLen += 64;
  const padded = new Uint8Array(len + padLen + 8);
  padded.set(input); padded[len] = 0x80;
  const bl = len * 8;
  for (let i = 0; i < 4; i++) padded[len + padLen + i] = (bl >>> (i*8)) & 0xff;
  const dv = new DataView(padded.buffer);
  let a0=0x67452301, b0=0xefcdab89, c0=0x98badcfe, d0=0x10325476;
  for (let off = 0; off < padded.length; off += 64) {
    const M = Array.from({length:16}, (_,j) => dv.getUint32(off + j*4, true));
    let A=a0, B=b0, C=c0, D=d0;
    for (let j = 0; j < 64; j++) {
      let F, g;
      if      (j < 16) { F=(B&C)|(~B&D); g=j; }
      else if (j < 32) { F=(D&B)|(~D&C); g=(5*j+1)%16; }
      else if (j < 48) { F=B^C^D;        g=(3*j+5)%16; }
      else             { F=C^(B|~D);     g=(7*j)%16; }
      F=(F+A+T[j]+M[g])>>>0; A=D; D=C; C=B;
      const r=S[j]; B=(B+((F<<r)|(F>>>(32-r))))>>>0;
    }
    a0=(a0+A)>>>0; b0=(b0+B)>>>0; c0=(c0+C)>>>0; d0=(d0+D)>>>0;
  }
  const out=new Uint8Array(16), ov=new DataView(out.buffer);
  ov.setUint32(0,a0,true); ov.setUint32(4,b0,true);
  ov.setUint32(8,c0,true); ov.setUint32(12,d0,true);
  return out;
}

// ═══════════════════════════════════════════════════════════════════
//  CRC-16
// ═══════════════════════════════════════════════════════════════════
function reverseBits16(v) { let o=0; for(let i=0;i<16;i++) if(v&(1<<i)) o|=(1<<(15-i)); return o&0xffff; }
function reverseBits8(v)  { let o=0; for(let i=0;i<8;i++)  if(v&(1<<i)) o|=(1<<(7-i));  return o&0xff;   }
function crc16(buf) {
  let crc=0;
  for (const b of buf) {
    crc ^= (reverseBits8(b) << 8);
    for (let i=0; i<8; i++) crc = (crc & 0x8000) ? ((crc<<1)^0x1021)&0xffff : (crc<<1)&0xffff;
  }
  return reverseBits16(crc);
}
function appendBytes(a, b) { const o=new Uint8Array(a.length+b.length); o.set(a); o.set(b,a.length); return o; }

function verifyFrame(frame) {
  if (frame.length < 12) return false;
  if (frame[0]!==0xaa||frame[1]!==0x11||frame[2]!==0x77||frame[3]!==0xdd) return false;
  const dv = new DataView(frame.buffer, frame.byteOffset, frame.byteLength);
  const dataLen = dv.getUint16(4, false);
  const total = 6 + dataLen + 2;
  if (total !== frame.length) return false;
  return dv.getUint16(total-2, false) === crc16(frame.slice(0, total-2));
}
function extractFrames(buf) {
  const frames=[]; let i=0;
  while (i+8 <= buf.length) {
    if (!(buf[i]===0xaa&&buf[i+1]===0x11&&buf[i+2]===0x77&&buf[i+3]===0xdd)) { i++; continue; }
    if (i+6 > buf.length) break;
    const dv = new DataView(buf.buffer, buf.byteOffset+i, buf.length-i);
    const dataLen = dv.getUint16(4,false);
    const total = 6+dataLen+2;
    if (i+total > buf.length) break;
    frames.push(buf.slice(i, i+total));
    i += total;
  }
  return { frames, rest: buf.slice(i) };
}

let seq = 0;
function nextSeq() { seq=(seq+1)&0xffff; if(seq===0) seq=1; return seq; }

// ═══════════════════════════════════════════════════════════════════
//  数据包构建
// ═══════════════════════════════════════════════════════════════════
function pack(cmdId, payload = new Uint8Array(0)) {
  const buf  = new Uint8Array(10 + payload.length + 2);
  const view = new DataView(buf.buffer);
  buf[0]=0xaa; buf[1]=0x11; buf[2]=0x77; buf[3]=0xdd;
  view.setUint16(4, payload.length+4, false);
  view.setUint16(6, cmdId, false);
  view.setUint16(8, nextSeq(), false);
  buf.set(payload, 10);
  view.setUint16(10+payload.length, crc16(buf.slice(0, 10+payload.length)), false);
  return buf;
}
function buildGetTokenReq() { return pack(0x0001); }

function buildOpenLockReq(token, cfg, actionIncation=1) {
  const newFw  = isNewFirmware(cfg.hardVersion);
  const payload = new Uint8Array(newFw ? 140 : 83);
  const pv      = new DataView(payload.buffer);
  const enc     = s => new TextEncoder().encode(s);
  pv.setUint16(0, actionIncation, false);
  payload.set(enc(cfg.loginName).slice(0,18), 2);
  payload.set(enc(cfg.expireTime).slice(0,10), 20);
  payload.set(enc(cfg.createTime).slice(0,10), 30);
  pv.setUint16(40, cfg.adminFlag, false);
  const keyBytes = hexToBytes(cfg.keyId);
  const mi = new Uint8Array(keyBytes.length + token.length);
  mi.set(keyBytes); mi.set(token, keyBytes.length);
  payload.set(md5(mi), 42);
  const now = new Date();
  const ts  = String(now.getFullYear()) +
    pad2(now.getMonth()+1) + pad2(now.getDate()) +
    pad2(now.getHours())   + pad2(now.getMinutes()) +
    pad2(now.getSeconds()) + pad3(now.getMilliseconds());
  payload.set(enc(ts.slice(0,17)), 58);
  pv.setUint16(75, cfg.isReverse, false);
  pv.setUint16(77, cfg.delayRestore, false);
  pv.setUint16(79, cfg.motorOpen, false);
  pv.setUint16(81, cfg.motorClose, false);
  if (newFw) {
    payload.set(enc(cfg.serverAddress).slice(0,37), 83);
    pv.setUint16(136, 0, false);
    pv.setUint16(138, cfg.openReverseType, false);
  }
  return pack(0x000D, payload);
}
function isNewFirmware(v) {
  const p = (v||'').split('.');
  return p.length >= 5 && p[p.length-1] > '200629';
}

// ═══════════════════════════════════════════════════════════════════
//  BLE UUID 表
// ═══════════════════════════════════════════════════════════════════
const UUID_TABLE = {
  TI: { service:'f000c0e0-0451-4000-b000-000000000000', write:'f000c0e1-0451-4000-b000-000000000000', read:'f000c0e2-0451-4000-b000-000000000000' },
  ZG: { service:'0000fff0-0000-1000-8000-00805f9b34fb', write:'0000fff2-0000-1000-8000-00805f9b34fb', read:'0000fff1-0000-1000-8000-00805f9b34fb' },
};
function detectPcbType(name) { return (name.includes('TMC_')||name.includes('TP_')) ? 'ZG' : 'TI'; }

async function writeChar(ch, data) {
  if (typeof ch.writeValue === 'function') return ch.writeValue(data);
  if (typeof ch.writeValueWithoutResponse === 'function') return ch.writeValueWithoutResponse(data);
  throw new Error('当前特征不支持写入');
}

// ═══════════════════════════════════════════════════════════════════
//  工具：统一设备名称格式
// ═══════════════════════════════════════════════════════════════════
function normalizeName(name) {
  return (name||'').toUpperCase().replace('BLDLOCK','BLELOCK').replace('CLELOCK','BLELOCK');
}

// ═══════════════════════════════════════════════════════════════════
//  Web Bluetooth：后台扫描（requestLEScan，实验性）
// ═══════════════════════════════════════════════════════════════════
function scanForDevice(targetId) {
  return new Promise((resolve, reject) => {
    let scan=null, settled=false;
    function settle(fn, val) {
      if (settled) return; settled=true;
      clearTimeout(timer);
      navigator.bluetooth.removeEventListener('advertisementreceived', onAdv);
      if (scan) { try { scan.stop(); } catch(_) {} }
      fn(val);
    }
    const timer = setTimeout(() => settle(reject, new Error('SCAN_TIMEOUT')), 10000);
    function onAdv(evt) {
      const name = normalizeName(evt.device.name);
      if (evt.device.name) log(`发现: ${evt.device.name}`, 'info');
      if (name === targetId) { log(`自动匹配成功: ${evt.device.name}`, 'success'); settle(resolve, evt.device); }
    }
    navigator.bluetooth.addEventListener('advertisementreceived', onAdv);
    navigator.bluetooth.requestLEScan({
      filters:[{namePrefix:'BLELOCK'},{namePrefix:'BLDLOCK'},{namePrefix:'TMC_'},{namePrefix:'TP_'},{namePrefix:'CLE'},{namePrefix:'BLEGAWA'},{namePrefix:'BLEMOZU'}],
      keepRepeatedDevices:false,
    }).then(s => { scan=s; }).catch(e => { settle(reject,e); });
  });
}

// ═══════════════════════════════════════════════════════════════════
//  Web Bluetooth：自动搜索并匹配设备（三级策略）
// ═══════════════════════════════════════════════════════════════════
async function autoFindDevice(targetId, scanAll) {
  const optSvc = [UUID_TABLE.TI.service, UUID_TABLE.ZG.service];
  if (!scanAll) {
    if (typeof navigator.bluetooth.getDevices === 'function') {
      try {
        const permitted = await navigator.bluetooth.getDevices();
        log(`已授权设备 ${permitted.length} 个，检查匹配...`, 'info');
        for (const d of permitted) {
          if (normalizeName(d.name) === targetId) { log(`直接连接已授权设备: ${d.name}`, 'success'); return d; }
        }
        if (permitted.length > 0) log('已授权设备中无匹配，继续扫描...', 'warn');
      } catch(_) {}
    }
    if (typeof navigator.bluetooth.requestLEScan === 'function') {
      try {
        log(`后台扫描中，目标: ${targetId}...`, 'info');
        return await scanForDevice(targetId);
      } catch(e) {
        const safe = e.message==='SCAN_TIMEOUT'||e.name==='NotSupportedError'||e.name==='SecurityError';
        if (!safe) throw e;
        log(e.message==='SCAN_TIMEOUT' ? '10s 内未发现目标，切换到手动选择...' : '扫描 API 不可用，切换到手动选择...', 'warn');
      }
    }
  }
  log(scanAll ? '展示全部设备供选择...' : `弹出选择器（精确匹配 ${targetId}）...`, 'info');
  try {
    const opts = scanAll
      ? { acceptAllDevices:true, optionalServices:optSvc }
      : { filters:[{name:targetId},{namePrefix:'BLELOCK'},{namePrefix:'BLDLOCK'},{namePrefix:'TMC_'},{namePrefix:'TP_'},{namePrefix:'CLE'},{namePrefix:'BLEGAWA'},{namePrefix:'BLEMOZU'},{services:[UUID_TABLE.TI.service]},{services:[UUID_TABLE.ZG.service]}], optionalServices:optSvc };
    return await navigator.bluetooth.requestDevice(opts);
  } catch(e) {
    if (e.name==='NotFoundError') throw new Error('未选择设备');
    throw e;
  }
}

// ═══════════════════════════════════════════════════════════════════
//  开锁协议核心（通用，供两条路径复用）
// ═══════════════════════════════════════════════════════════════════
async function runLockProtocol(cfg, writeFunc, waiters) {
  function addWaiter(cmdId, cb) { const l=waiters.get(cmdId)||[]; l.push(cb); waiters.set(cmdId,l); }
  function removeWaiter(cmdId, cb) {
    const l=waiters.get(cmdId); if(!l) return;
    const i=l.indexOf(cb); if(i>=0) l.splice(i,1); if(!l.length) waiters.delete(cmdId);
  }
  function waitCmd(cmdId, ms) {
    return new Promise((res,rej) => {
      const onF = f => { clearTimeout(t); removeWaiter(cmdId,onF); res(f); };
      const t = setTimeout(() => { removeWaiter(cmdId,onF); rej(new Error('timeout')); }, ms);
      addWaiter(cmdId, onF);
    });
  }

  // GetToken
  log('请求 Token...', 'info');
  let tokenFrame = null;
  for (let a=1; a<=4; a++) {
    const req = buildGetTokenReq();
    console.log('TX GetTokenReq', bytesToHex(req));
    await writeFunc(req);
    try { tokenFrame = await waitCmd(0xf001, a===1?6500:4200); break; }
    catch(_) {
      if (a===4) throw new Error('多次请求后仍未收到 Token（设备无响应）');
      log(`第 ${a} 次请求 Token 超时，重试中...`, 'warn'); await delay(260);
    }
  }
  const tokenDv = new DataView(tokenFrame.buffer, tokenFrame.byteOffset, tokenFrame.byteLength);
  if (tokenDv.getUint16(10,false) !== 0)
    throw new Error(`Token 响应异常 0x${tokenDv.getUint16(10,false).toString(16).padStart(4,'0').toUpperCase()}`);
  const token = tokenFrame.slice(12, 28);
  log(`Token: ${bytesToHex(token).slice(0,8)}...`, 'info');

  // OpenLock
  log('发送开锁指令...', 'info');
  const openReq = buildOpenLockReq(token, cfg, 1);
  console.log('TX OpenLockReq', bytesToHex(openReq));
  await writeFunc(openReq);
  let status = null;
  try { const f=await waitCmd(0xf00d,5000); status=new DataView(f.buffer,f.byteOffset,f.byteLength).getUint16(10,false); }
  catch(_) { status=null; }
  if (status!==null && status!==0)
    throw new Error(`开锁失败，错误码 0x${status.toString(16).toUpperCase().padStart(4,'0')}`);
  log(status===null?'开锁指令已发送（无响应确认）':'开锁成功！', status===null?'warn':'success');
  setBtnState('success');

  // 倒计时
  const holdSecs = (cfg.unlockHoldSeconds > 0) ? cfg.unlockHoldSeconds : 10;
  const lbl = document.getElementById('btnLabel');
  for (let i=holdSecs; i>0; i--) { lbl.textContent=`${i} 秒后关锁`; await delay(1000); }

  // AutoClose
  log('自动关锁中...', 'info');
  setBtnState('busy');
  const closeReq = buildOpenLockReq(token, cfg, 2);
  console.log('TX AutoCloseLockReq', bytesToHex(closeReq));
  await writeFunc(closeReq);
  let cs = null;
  try { const f=await waitCmd(0xf00d,5000); cs=new DataView(f.buffer,f.byteOffset,f.byteLength).getUint16(10,false); }
  catch(_) { cs=null; }
  if (cs!==null && cs!==0) {
    log(`自动关锁失败 0x${cs.toString(16).toUpperCase().padStart(4,'0')}`, 'error'); setBtnState('error');
  } else {
    log(cs===null?'关锁指令已发送（无响应确认）':'自动关锁成功！', cs===null?'warn':'success'); setBtnState('closed');
  }
}

// ═══════════════════════════════════════════════════════════════════
//  开锁主流程 — Android 原生 BLE 路径
// ═══════════════════════════════════════════════════════════════════
async function doOpenLockNative(cfg) {
  const targetId = normalizeName(cfg.bluetoothId);
  log(`目标设备 ID: ${cfg.bluetoothId}`, 'info');

  log(`后台扫描中: ${targetId}...`, 'info');
  const scanData = await nativeCall(id => window.AndroidBridge.bleScan(targetId, id));
  const sep = scanData.indexOf('|');
  const address = scanData.slice(0, sep);
  const rawName = scanData.slice(sep+1);
  log(`已发现: ${rawName} [${address}]`, 'success');

  log('正在连接...', 'info');
  await nativeCall(id => window.AndroidBridge.bleConnect(address, id));
  log('GATT 已连接', 'info');

  const pcbType  = detectPcbType(normalizeName(rawName));
  const uuids    = UUID_TABLE[pcbType];
  const fallback = pcbType==='TI' ? UUID_TABLE.ZG : UUID_TABLE.TI;

  let linked = false;
  for (const u of [uuids, fallback]) {
    try {
      await nativeCall(id => window.AndroidBridge.bleDiscoverSubscribe(u.service, u.write, u.read, id));
      log(`服务已找到 (${u.service.slice(0,8)}...)`, 'info');
      linked = true; break;
    } catch(_) {}
  }
  if (!linked) { window.AndroidBridge.bleDisconnect(); throw new Error('找不到兼容的 BLE 服务'); }

  await delay(380);

  let rxBuf = new Uint8Array(0);
  const waiters = new Map();

  window.JSBridge.setNotifyHandler(hex => {
    console.log('RX (native)', hex);
    rxBuf = appendBytes(rxBuf, hexToBytes(hex));
    const { frames, rest } = extractFrames(rxBuf);
    rxBuf = rest;
    for (const frame of frames) {
      const cmdId = new DataView(frame.buffer, frame.byteOffset, frame.byteLength).getUint16(6,false);
      const list = waiters.get(cmdId);
      if (list?.length > 0) { const cb=list.shift(); if(!list.length) waiters.delete(cmdId); cb(frame); }
    }
  });

  async function nativeWrite(data) {
    for (let i=0; i<data.length; i+=20) {
      await nativeCall(id => window.AndroidBridge.bleWrite(bytesToHex(data.slice(i,i+20)), id));
      if (i+20 < data.length) await delay(30);
    }
  }

  try {
    await runLockProtocol(cfg, nativeWrite, waiters);
  } finally {
    window.JSBridge.setNotifyHandler(null);
    window.AndroidBridge.bleDisconnect();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  开锁主流程 — Web Bluetooth 路径（浏览器降级）
// ═══════════════════════════════════════════════════════════════════
async function doOpenLock(cfg, scanAll=false) {
  if (!navigator.bluetooth) throw new Error('此浏览器不支持 Web Bluetooth API');

  const targetId = normalizeName(cfg.bluetoothId);
  log(`目标设备 ID: ${cfg.bluetoothId}`, 'info');
  const device = await autoFindDevice(targetId, scanAll);
  log(`已选设备: ${device.name||'未知'}`, 'info');

  log('正在连接...', 'info');
  const server = await device.gatt.connect();

  const devName  = normalizeName(device.name||'');
  const pcbType  = detectPcbType(devName);
  const uuids    = UUID_TABLE[pcbType];
  const fallback = pcbType==='TI' ? UUID_TABLE.ZG : UUID_TABLE.TI;

  let service, writeCh, readCh;
  for (const u of [uuids, fallback]) {
    try {
      service = await server.getPrimaryService(u.service);
      writeCh = await service.getCharacteristic(u.write);
      readCh  = await service.getCharacteristic(u.read);
      log(`服务已找到 (${u.service.slice(0,8)}...)`, 'info'); break;
    } catch(_) { service=null; }
  }
  if (!service) { device.gatt.disconnect(); throw new Error('找不到兼容的 BLE 服务'); }

  log('订阅通知特征...', 'info');
  await readCh.startNotifications();
  await delay(380);

  let rxBuf = new Uint8Array(0);
  const waiters = new Map();

  function onNotify(evt) {
    const dv = evt.target.value;
    const chunk = new Uint8Array(dv.buffer, dv.byteOffset, dv.byteLength);
    console.log('RX chunk', bytesToHex(chunk));
    rxBuf = appendBytes(rxBuf, chunk);
    const { frames, rest } = extractFrames(rxBuf);
    rxBuf = rest;
    for (const frame of frames) {
      const cmdId = new DataView(frame.buffer, frame.byteOffset, frame.byteLength).getUint16(6,false);
      const list = waiters.get(cmdId);
      if (list?.length > 0) { const cb=list.shift(); if(!list.length) waiters.delete(cmdId); cb(frame); }
    }
  }
  readCh.addEventListener('characteristicvaluechanged', onNotify);

  async function webWrite(data) {
    for (let i=0; i<data.length; i+=20) {
      await writeChar(writeCh, data.slice(i,i+20));
      if (i+20 < data.length) await delay(30);
    }
  }

  try {
    await runLockProtocol(cfg, webWrite, waiters);
  } finally {
    readCh.removeEventListener('characteristicvaluechanged', onNotify);
    if (device.gatt?.connected) device.gatt.disconnect();
  }
}

function saveInfoPanelSettings() {

// ═══════════════════════════════════════════════════════════════════
//  ▌ 钥匙管理
// ═══════════════════════════════════════════════════════════════════
const KEYS_KEY       = 'ble_lock_keys';
const ACTIVE_KEY_KEY = 'ble_lock_active';

let savedKeys   = [];
let activeKeyId = null;

function loadKeys() {
  try { savedKeys   = JSON.parse(localStorage.getItem(KEYS_KEY)) || []; } catch(_) { savedKeys = []; }
  try { activeKeyId = localStorage.getItem(ACTIVE_KEY_KEY) || null; }    catch(_) {}
}

function persistKeys()      { try { localStorage.setItem(KEYS_KEY,       JSON.stringify(savedKeys)); } catch(_) {} }
function persistActiveKey() { try { localStorage.setItem(ACTIVE_KEY_KEY, activeKeyId || '');         } catch(_) {} }

function autoSaveKey(item, loginname, cookies, appinfo) {
  if (!item.keyid) return;
  if (savedKeys.find(k => k.keyid === item.keyid)) return;
  savedKeys.push({
    keyid:       item.keyid,
    label:       appinfo?.roomcode || '',
    bluetoothid: item.bluetoothid || '',
    expiretime:  item.expiretime  || '',
    createtime:  item.createtime  || '',
    loginname:   loginname        || '',
    cookies:     cookies          || '',
    appinfo:     appinfo          || null,
    savedAt:     new Date().toISOString(),
  });
  persistKeys();
  renderKeysList();
  log(`新钥匙已保存: ${item.keyid.slice(0,8)}...`, 'success');
}

function activateKey(keyid) {
  activeKeyId = keyid;
  persistActiveKey();
  const k = savedKeys.find(k => k.keyid === keyid);
  if (k) {
    document.getElementById('cfg-btid').value   = k.bluetoothid || '';
    document.getElementById('cfg-keyid').value  = k.keyid       || '';
    document.getElementById('cfg-expire').value = k.expiretime  || '';
    document.getElementById('cfg-create').value = k.createtime  || '';
    if (k.loginname) document.getElementById('cfg-login').value   = k.loginname;
    if (k.cookies)   document.getElementById('cfg-cookies').value = k.cookies;
    saveConfig();
    // 同步信息面板：使用该钥匙保存的 appinfo
    if (k.appinfo) {
      infoPanelData = k.appinfo;
      renderInfoPanel();
    }
  }
  renderKeysList();
  renderActiveKeyCard();
}

function deleteKey(keyid) {
  const k    = savedKeys.find(k => k.keyid === keyid);
  const name = k ? (k.label || k.bluetoothid || keyid.slice(0,8)) : keyid.slice(0,8);
  if (!confirm(`删除钥匙「${name}」？`)) return;
  savedKeys = savedKeys.filter(k => k.keyid !== keyid);
  if (activeKeyId === keyid) { activeKeyId = null; persistActiveKey(); renderActiveKeyCard(); }
  persistKeys();
  renderKeysList();
}

function renderKeysList() {
  const el = document.getElementById('keysList');
  if (savedKeys.length === 0) {
    el.innerHTML = '<div class="empty-state">暂无保存的钥匙<br>刷新配置可自动保存新钥匙</div>';
    return;
  }
  el.innerHTML = savedKeys.map(k => {
    const isActive = k.keyid === activeKeyId;
    const label    = k.label || '未命名';
    const btid     = k.bluetoothid
      ? (k.bluetoothid.length > 26 ? k.bluetoothid.slice(0,26) + '…' : k.bluetoothid)
      : '—';
    const parts = [];
    if (k.expiretime) parts.push(`到期: ${k.expiretime}`);
    if (k.savedAt)    parts.push(`存入: ${k.savedAt.slice(0,10)}`);
    const meta = parts.join(' · ');
    return `<div class="key-card${isActive ? ' active-key' : ''}" onclick="activateKey('${escHtml(k.keyid)}')">
      <div class="key-card-top">
        <div class="key-card-info">
          <div class="key-card-label">${escHtml(label)}${isActive ? '<span class="active-badge">使用中</span>' : ''}</div>
          <div class="key-card-btid">${escHtml(btid)}</div>
        </div>
        <div class="key-card-actions">
          <button class="key-action-btn" onclick="event.stopPropagation();openKeyEditor('${escHtml(k.keyid)}')" title="编辑">✏️</button>
          <button class="key-action-btn del" onclick="event.stopPropagation();deleteKey('${escHtml(k.keyid)}')" title="删除">🗑</button>
        </div>
      </div>
      ${meta ? `<div class="key-card-meta">${escHtml(meta)}</div>` : ''}
    </div>`;
  }).join('');
}

function renderActiveKeyCard() {
  const card = document.getElementById('activeKeyCard');
  const k    = activeKeyId ? savedKeys.find(k => k.keyid === activeKeyId) : null;
  if (!k) { card.style.display = 'none'; return; }
  card.style.display = '';
  document.getElementById('activeKeyName').textContent = k.label || k.bluetoothid || '未命名';
  const sub = [k.bluetoothid, k.expiretime ? `到期: ${k.expiretime}` : ''].filter(Boolean).join(' · ');
  document.getElementById('activeKeySub').textContent = sub;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Key editor ──
let editingKeyId = null;

function openKeyEditor(keyid) {
  editingKeyId = keyid;
  const k = keyid ? savedKeys.find(k => k.keyid === keyid) : null;
  document.getElementById('keyEditorTitle').textContent = k ? '编辑钥匙' : '新建钥匙';
  document.getElementById('edit-label').value  = k?.label       || '';
  document.getElementById('edit-btid').value   = k?.bluetoothid || '';
  document.getElementById('edit-keyid').value  = k?.keyid       || '';
  document.getElementById('edit-expire').value = k?.expiretime  || '';
  document.getElementById('edit-create').value = k?.createtime  || '';
  document.getElementById('edit-login').value  = k?.loginname   || '';
  document.getElementById('keyEditorModal').classList.add('open');
}

function closeKeyEditor() {
  document.getElementById('keyEditorModal').classList.remove('open');
}

function saveKeyEdit() {
  const keyid = document.getElementById('edit-keyid').value.trim();
  if (!keyid) { alert('Key ID 不能为空'); return; }
  // 只包含表单里可编辑的字段
  const edits = {
    keyid,
    label:       document.getElementById('edit-label').value.trim(),
    bluetoothid: document.getElementById('edit-btid').value.trim(),
    expiretime:  document.getElementById('edit-expire').value.trim(),
    createtime:  document.getElementById('edit-create').value.trim(),
    loginname:   document.getElementById('edit-login').value.trim(),
  };
  if (editingKeyId) {
    const idx = savedKeys.findIndex(k => k.keyid === editingKeyId);
    if (idx >= 0) {
      // 展开旧对象，再用表单值覆盖对应字段，appinfo/cookies 等不在表单里的字段自动保留
      savedKeys[idx] = { ...savedKeys[idx], ...edits };
    } else {
      savedKeys.push({ ...edits, savedAt: new Date().toISOString() });
    }
  } else {
    const existing = savedKeys.findIndex(k => k.keyid === keyid);
    if (existing >= 0) savedKeys[existing] = { ...savedKeys[existing], ...edits };
    else savedKeys.push({ ...edits, savedAt: new Date().toISOString() });
  }
  persistKeys();
  renderKeysList();
  closeKeyEditor();
}

// ── Import / Export ──
function exportKeys() {
  if (savedKeys.length === 0) { alert('没有可导出的钥匙'); return; }
  const json = JSON.stringify({ version: 1, keys: savedKeys }, null, 2);
  document.getElementById('exportTextarea').value = json;
  document.getElementById('exportModal').classList.add('open');
}

function closeExportModal() { document.getElementById('exportModal').classList.remove('open'); }

function downloadExportFile() {
  const json     = document.getElementById('exportTextarea').value;
  const filename = `ble_keys_${new Date().toISOString().slice(0,10)}.json`;
  if (NATIVE) {
    window.AndroidBridge.downloadFile(filename, json);
    closeExportModal();
    return;
  }
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  closeExportModal();
}

function copyExportText() {
  const ta = document.getElementById('exportTextarea');
  ta.select();
  try { document.execCommand('copy'); alert('已复制到剪贴板'); } catch(_) { alert('请长按文本手动复制'); }
  closeExportModal();
}

function importKeys() {
  document.getElementById('importTextarea').value = '';
  document.getElementById('importModal').classList.add('open');
}

function closeImportModal() { document.getElementById('importModal').classList.remove('open'); }

function triggerFileImport() {
  document.getElementById('importFileInput').click();
}

function importFromText() {
  const text = document.getElementById('importTextarea').value.trim();
  if (!text) { alert('请先粘贴 JSON 内容'); return; }
  mergeImportedKeys(text);
  closeImportModal();
}

function handleImportFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    mergeImportedKeys(e.target.result);
    closeImportModal();
  };
  reader.readAsText(file);
  evt.target.value = '';
}

function mergeImportedKeys(text) {
  try {
    const data = JSON.parse(text);
    const list = Array.isArray(data) ? data : (Array.isArray(data.keys) ? data.keys : null);
    if (!list) { alert('文件格式不正确，需要包含 keys 数组'); return; }
    let added = 0, merged = 0;
    for (const k of list) {
      if (!k.keyid) continue;
      const idx = savedKeys.findIndex(x => x.keyid === k.keyid);
      if (idx >= 0) { savedKeys[idx] = { ...savedKeys[idx], ...k }; merged++; }
      else          { savedKeys.push(k); added++; }
    }
    persistKeys();
    renderKeysList();
    alert(`导入完成！新增 ${added} 把，合并更新 ${merged} 把`);
  } catch(err) {
    alert('解析失败: ' + err.message);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  刷新锁配置（登录 + 拉取钥匙信息）
// ═══════════════════════════════════════════════════════════════════
async function refreshConfig() {
  const loginname = document.getElementById('cfg-login').value.trim();
  if (!loginname) { log('请先填写账号', 'warn'); return; }

  const btn = document.querySelector('.refresh-cfg-btn');
  btn.disabled = true; btn.textContent = '刷新中…'; btn.style.opacity = '.6';

  try {
    const cookiesInput = document.getElementById('cfg-cookies');
    const buildHeaders = () => {
      const headers = { 'Content-Type': 'application/json' };
      const cookie = cookiesInput.value.trim();
      if (cookie) headers['Cookie'] = cookie.includes('JSESSIONID=') ? cookie : `JSESSIONID=${cookie}`;
      return headers;
    };

    log(`刷新登录状态 (${loginname})...`, 'info');
    const loginResp = await apiPost(
      'https://csmy.hzcu.edu.cn/csmy/bsframe/business//AppUser!appLogin.do',
      buildHeaders(), { loginname }
    );
    log('登录状态已刷新', 'info');

    // 保存 appinfo 到信息面板
    if (loginResp?.appinfo) {
      infoPanelData = loginResp.appinfo;
      saveInfoPanelSettings();
      renderInfoPanel();
    }

    const newCookie = loginResp?.jsessionid || loginResp?.JSESSIONID || loginResp?.sessionId || loginResp?.sessionid || loginResp?.cookie;
    if (newCookie) {
      const normalized = String(newCookie).replace(/^JSESSIONID=/i, '');
      cookiesInput.value = normalized;
      log('已更新会话 Cookie', 'info');
    }

    log('正在拉取锁配置...', 'info');
    const data = await apiPost(
      'https://csmy.hzcu.edu.cn/csmy/bsframe/business/AppLockGrant!appPullDownKeyInfoList.do',
      buildHeaders(), { statusstr:'0;1;2;3;4;5', page:1, order:'order by keyinfoid desc', rows:20 }
    );

    if (data.result !== 'success') {
      throw new Error(data.message || data.msg || data.error || `锁配置拉取失败：${JSON.stringify(data)}`);
    }
    if (!Array.isArray(data.list) || data.list.length === 0) {
      throw new Error(`当前账号没有可用的锁配置。后端返回：${JSON.stringify({ result: data.result, total: data.total, count: data.count, message: data.message || data.msg || '' })}`);
    }

    const currentCookies = cookiesInput.value.trim();
    const currentAppinfo = loginResp?.appinfo || null;
    for (const item of data.list) {
      autoSaveKey(item, loginname, currentCookies, currentAppinfo);
    }

    const item = data.list[0];
    document.getElementById('cfg-btid').value   = item.bluetoothid || '';
    document.getElementById('cfg-keyid').value  = item.keyid       || '';
    document.getElementById('cfg-expire').value = item.expiretime  || '';
    document.getElementById('cfg-create').value = item.createtime  || '';
    log(`蓝牙ID:   ${item.bluetoothid}`,  'success');
    log(`Key ID:   ${item.keyid}`,         'success');
    log(`到期时间: ${item.expiretime}`,    'success');
    log(`创建时间: ${item.createtime}`,    'success');
    log('配置已更新', 'success');

    // 若当前无激活钥匙，自动激活第一把
    if (!activeKeyId && item.keyid) {
      activeKeyId = item.keyid;
      persistActiveKey();
      renderActiveKeyCard();
      renderKeysList();
    }

    saveConfig();
  } catch(e) {
    log(e.message || String(e), 'error');
  } finally {
    btn.disabled = false; btn.textContent = '↻  刷新配置'; btn.style.opacity = '';
  }
}

    adminFlag:        0,
    hardVersion:      '2.1.xy.N18.220428',
    isReverse:        0,
    delayRestore:     0,
    motorOpen:        0,
    motorClose:       0,
    openReverseType:  0,
    serverAddress:    'csmy.hzcu.edu.cn',

// ═══════════════════════════════════════════════════════════════════
//  关锁延迟步进器
// ═══════════════════════════════════════════════════════════════════
function stepDelay(delta) {
  const input = document.getElementById('cfg-delay');
  const val   = Math.min(300, Math.max(1, (parseInt(input.value, 10) || 5) + delta));
  input.value = val;
  document.getElementById('delayDisplay').textContent = val;
  saveConfig();
}

function syncDelayDisplay() {
  const val = parseInt(document.getElementById('cfg-delay').value, 10) || 5;
  document.getElementById('delayDisplay').textContent = val;
}

// ═══════════════════════════════════════════════════════════════════
//  Tab 导航
// ═══════════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const page = document.getElementById('page-' + tab);
  if (page) page.classList.add('active');
  const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (btn) btn.classList.add('active');
}

// ═══════════════════════════════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════════════════════════════
(function init() {
  loadConfig();
  syncDelayDisplay();
  loadInfoPanelSettings();
  loadKeys();
  // 若活跃钥匙有 appinfo，以它为准覆盖全局面板数据
  if (activeKeyId) {
    const ak = savedKeys.find(k => k.keyid === activeKeyId);
    if (ak?.appinfo) infoPanelData = ak.appinfo;
  }
  renderInfoPanel();
  renderKeysList();
  renderActiveKeyCard();

  let saveTimer = null;
  for (const id of CFG_FIELDS) {
    const el = document.getElementById(id);
    if (!el) continue;
    el.addEventListener('input', () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveConfig, 600);
    });
    el.addEventListener('change', saveConfig);
  }
})();
</script>
